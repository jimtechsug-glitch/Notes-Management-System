name: Build Desktop and Mobile Apps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create Production .env
        shell: bash
        run: |
          echo "NODE_ENV=production" > .env
          echo "PORT=5000" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET || 'nsoma_production_secret_key_123' }}" >> .env
          echo "JWT_EXPIRE=365d" >> .env
          echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "UPLOADS_PATH=./uploads" >> .env
          echo "DATABASE_STORAGE=./database.sqlite" >> .env

      - name: Build Windows Executable
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Nsoma-DigLibs-Windows
          path: |
            dist/*.exe
            dist/*.blockmap

  build-android:
    name: Build Android (.apk)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Android APK
        run: |
          npx cap sync android
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nsoma-DigLibs-Android
          path: android/app/build/outputs/apk/debug/app-debug.apk
