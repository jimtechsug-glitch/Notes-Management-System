services:
  db:
    image: postgres:15-alpine
    network_mode: host
    environment:
      POSTGRES_DB: ${DB_NAME:-notes_management}
      POSTGRES_USER: ${DB_USER:-notes_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-notes_admin} -d ${DB_NAME:-notes_management}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    network_mode: host
    environment:
      # database and app settings — use 127.0.0.1 since both containers share the host network
      - DB_HOST=127.0.0.1
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-notes_management}
      - DB_USER=${DB_USER:-notes_admin}
      - DB_PASSWORD=${DB_PASSWORD:-secure_password_123}
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_random_key_change_this}
      - JWT_EXPIRE=${JWT_EXPIRE:-7d}
      - PORT=5000

      # SSL settings (paths to files inside the container)
      - SSL_KEY_PATH=${SSL_KEY_PATH:-/app/certs/192.168.1.2+4-key.pem}
      - SSL_CERT_PATH=${SSL_CERT_PATH:-/app/certs/192.168.1.2+4.pem}
      - SSL_PORT=${SSL_PORT:-5443}
      - REDIRECT_HTTP_TO_HTTPS=${REDIRECT_HTTP_TO_HTTPS:-false}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./certs:/app/certs:ro

volumes:
  postgres_data:
